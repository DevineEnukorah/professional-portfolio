name: Validate and deploy portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate source
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Validate Python source
        run: python3 -m py_compile scripts/validate_site.py

      - name: Validate site structure, metadata, and security controls
        run: python3 scripts/validate_site.py

      - name: Validate JavaScript syntax
        run: |
          node --check assets/js/theme.js
          node --check assets/js/main.js

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Create deployment artifact
        shell: bash
        run: |
          set -euo pipefail
          install -d _site
          cp index.html 404.html robots.txt sitemap.xml site.webmanifest .nojekyll _site/
          cp -R assets images _site/

      - name: Upload deployment artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: ./_site
          retention-days: 1
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
