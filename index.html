        const useScrollReveal = () => {
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
                );

                if (ref.current) observer.observe(ref.current);
                return () => {
                    if (ref.current) observer.unobserve(ref.current);
                };
            }, []);

            return ref;
        };

                                <Reveal>
                                    <SectionTitle subtitle="Professional positioning">Automation that works in the real world</SectionTitle>
                                </Reveal>

                                <div className="grid lg:grid-cols-12 gap-12 lg:gap-16 items-center mt-10">
                                    <Reveal delay={100} className="lg:col-span-5 relative">
                                        <div className="relative w-full max-w-sm mx-auto aspect-[4/5] rounded-3xl overflow-hidden shadow-2xl">
                                            <div className="absolute inset-0 bg-gradient-to-tr from-indigo-500 to-purple-500 opacity-20 dark:opacity-40"></div>
                                            <div className="absolute inset-2 bg-slate-200 dark:bg-slate-800 rounded-2xl overflow-hidden flex items-center justify-center">
                                                {!isImageLoaded && <User size={64} className="text-slate-400 animate-pulse" />}
                                                <img
                                                    src={darkMode ? './images/Bless-Dark.png' : './images/Bless-White.png'}
                                                    alt="Devine Enukorah"
                                                    className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-700 ${isImageLoaded ? 'opacity-100' : 'opacity-0'}`}
                                                    onLoad={() => setIsImageLoaded(true)}
                                                />
                                            </div>
                                        </div>
                                    </Reveal>

                                    <Reveal delay={220} className="lg:col-span-7 space-y-8">
                                        <h3 className="text-3xl font-bold text-slate-900 dark:text-white">
                                            From repetitive process to reliable system.
                                        </h3>
                                        <p className="text-lg text-slate-600 dark:text-slate-400 leading-relaxed">
                                            I help businesses identify repetitive operational work, map the rules behind it, and turn it into dependable automation. My work connects AI models, APIs, business applications, and structured data without treating an LLM as the only decision-maker.
                                        </p>
                                        <p className="text-lg text-slate-600 dark:text-slate-400 leading-relaxed">
                                            I focus on systems that are understandable and reviewable. That means clear inputs and outputs, deterministic scoring where appropriate, controlled failure paths, confidence signals, and human review before consequential action.
                                        </p>

                                        <div className="grid sm:grid-cols-3 gap-5 pt-6 border-t border-slate-200 dark:border-slate-800">
                                            <div className="rounded-2xl bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 p-5">
                                                <p className="text-2xl font-extrabold text-indigo-600 dark:text-indigo-400 mb-2">n8n</p>
                                                <p className="text-sm font-semibold text-slate-500 dark:text-slate-400">Workflow orchestration</p>
                                            </div>
                                            <div className="rounded-2xl bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 p-5">
                                                <p className="text-2xl font-extrabold text-indigo-600 dark:text-indigo-400 mb-2">API-first</p>
                                                <p className="text-sm font-semibold text-slate-500 dark:text-slate-400">System integration</p>
                                            </div>
                                            <div className="rounded-2xl bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 p-5">
                                                <p className="text-2xl font-extrabold text-indigo-600 dark:text-indigo-400 mb-2">HITL</p>
                                                <p className="text-sm font-semibold text-slate-500 dark:text-slate-400">Human-in-the-loop control</p>
                                            </div>
                                        </div>
                                    </Reveal>
                                </div>
                            </div>
                        </section>

                        <section id="capabilities" className="py-24 bg-slate-100/55 dark:bg-slate-900/50 relative border-y border-slate-200/50 dark:border-slate-800/50">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <Reveal>
                                    <SectionTitle subtitle="Capabilities and stack">What I build and protect</SectionTitle>
                                </Reveal>

                                <div className="grid md:grid-cols-3 gap-8 mt-10">
                                    {CAPABILITIES.map((capability, index) => (
                                        <Reveal key={capability.category} delay={index * 120}>
                                            <article className="bg-white dark:bg-slate-800 rounded-3xl p-8 h-full shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-200 dark:border-slate-700 hover:-translate-y-2 transition-transform duration-300">
                                                <div className="w-16 h-16 bg-indigo-50 dark:bg-indigo-500/10 rounded-2xl flex items-center justify-center text-indigo-600 dark:text-indigo-400 mb-6">
                                                    <capability.icon size={32} />
                                                </div>
                                                <h3 className="text-2xl font-bold text-slate-900 dark:text-white mb-3">
                                                    {capability.category}
                                                </h3>
                                                <p className="text-slate-600 dark:text-slate-400 leading-relaxed mb-7">
                                                    {capability.description}
                                                </p>
                                                <div className="flex flex-wrap gap-2">
                                                    {capability.items.map((item) => (
                                                        <span
                                                            key={item}
                                                            className="px-3 py-2 bg-slate-50 dark:bg-slate-900 text-slate-700 dark:text-slate-300 rounded-lg text-sm font-semibold border border-slate-200 dark:border-slate-700"
                                                        >
                                                            {item}
                                                        </span>
                                                    ))}
                                                </div>
                                            </article>
                                        </Reveal>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section id="projects" className="py-24 relative">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <Reveal>
                                    <SectionTitle subtitle="Selected work">Featured AI automation projects</SectionTitle>
                                </Reveal>

                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-10">
                                    {PROJECTS.map((project, index) => (
                                        <ProjectCard key={project.title} project={project} index={index} />
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section id="contact" className="py-24 relative overflow-hidden">
                            <div className="absolute inset-0 bg-slate-900 dark:bg-black">
                                <div className="absolute inset-0 bg-gradient-to-b from-transparent to-indigo-900/45"></div>
                            </div>

                            <div className="max-w-4xl mx-auto px-4 relative z-10 text-center">
                                <Reveal>
                                    <Globe2 className="mx-auto text-indigo-400 mb-6" size={42} />
                                    <h2 className="text-4xl md:text-5xl font-extrabold text-white mb-6 tracking-tight">
                                        Have a workflow that needs improvement?
                                    </h2>
                                    <p className="text-slate-300 text-lg md:text-xl mb-12 max-w-3xl mx-auto leading-relaxed">
                                        Tell me where the process is repetitive, slow, inconsistent, or difficult to scale. I can help map the workflow, identify suitable automation points, and design the controls needed for dependable operation.
                                    </p>

                                    <div className="flex flex-col sm:flex-row gap-5 justify-center items-center">
                                        <a
                                            href={`mailto:${EMAIL}`}
                                            className="w-full sm:w-auto inline-flex items-center justify-center gap-3 px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-lg font-bold transition-all shadow-lg shadow-indigo-600/30 hover:-translate-y-1"
                                        >
                                            <Mail size={22} /> Start a Conversation
                                        </a>
                                        <button
                                            type="button"
                                            onClick={copyEmail}
                                            className="w-full sm:w-auto inline-flex items-center justify-center gap-3 px-8 py-4 bg-white/10 hover:bg-white/20 text-white backdrop-blur-md border border-white/20 rounded-xl text-lg font-bold transition-all hover:-translate-y-1"
                                        >
                                            {emailCopied ? <Check size={22} className="text-green-400" /> : <Copy size={22} />}
                                            {emailCopied ? 'Email Copied' : 'Copy Email'}
                                        </button>
                                    </div>
                                </Reveal>

                                <div className="mt-24 pt-8 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center gap-5">
                                    <p className="text-slate-400 font-medium">
                                        &copy; {CURRENT_YEAR} Devine Enukorah. All rights reserved.
                                    </p>
                                    <div className="flex gap-5">
                                        {SOCIALS.map((social) => (
                                            <a
                                                key={social.label}
                                                href={social.href}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="text-slate-400 hover:text-white transition-colors"
                                            >
                                                <span className="sr-only">{social.label}</span>
                                                <social.icon size={20} />
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    <button
                        type="button"
                        onClick={scrollToTop}
                        aria-label="Scroll to top"
                        className={`fixed bottom-8 right-8 p-4 rounded-2xl bg-indigo-600 text-white shadow-xl shadow-indigo-500/30 hover:bg-indigo-500 hover:-translate-y-2 transition-all duration-300 z-40 ${showBackToTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-20 pointer-events-none'}`}
                    >
                        <ArrowUp size={24} strokeWidth={2.5} />
                    </button>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
